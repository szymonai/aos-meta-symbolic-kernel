name: AOS Limited Demonstrator CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Ruff lint
        run: python -m ruff check .
      - name: Check synthetic benchmark artifacts
        run: python benchmarks/run_benchmarks.py --check
      - name: Check LLM assurance benchmark artifacts
        run: python benchmarks/run_llm_assurance_benchmark.py --check
      - name: Check hard-case benchmark artifacts
        run: python benchmarks/run_llm_hard_case_benchmark.py --check
      - name: Validate benchmark metrics
        run: python -m json.tool benchmarks/results/metrics.json > /dev/null
      - name: Python tests
        run: python -m pytest tests -q
      - name: Validate demonstrator manifest
        run: python -m json.tool evidence/demonstrator_manifest.json > /dev/null
      - name: Run hello-world example
        run: python examples/hello-world/hello_world.py
      - name: Run API gate example
        run: |
          python examples/api-gate/aos_api_gate.py evaluate \
            --input examples/api-gate/sample_input.json
          python examples/api-gate/aos_api_gate.py replay \
            --evidence examples/api-gate/sample_evidence.json
      - name: Validate hello-world Docker Compose config
        run: docker compose -f examples/hello-world/docker-compose.yml config --quiet
      - name: Run hello-world Docker Compose example
        run: docker compose -f examples/hello-world/docker-compose.yml run --rm hello-world
      - name: Install Lean
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Lean proof gap scan
        run: |
          if grep -R -nE '\b(axiom|admit|sorry|unsafe)\b' lean lakefile.lean; then
            echo "Lean proof gap term detected"
            exit 1
          fi
      - name: Lean build
        run: lake build
